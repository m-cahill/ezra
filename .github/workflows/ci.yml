name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check --no-fix .
      - name: Ruff (format check)
        run: ruff format --check .
      - name: Pydocstyle
        run: pydocstyle src/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Mypy
        run: mypy src/

  epb-tools-minimal:
    name: EPB Tools Minimal Environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Create venv and install project (no extras)
        run: |
          python -m pip install --upgrade pip
          pip install . pytest
      - name: Run EPB tools isolation tests
        run: |
          pytest tests/contracts/test_epb_tools_*.py -v

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Pytest with coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=term-missing
      - name: Coverage report
        run: |
          coverage report --fail-under=85
      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Export zone schema JSON
        run: |
          python -c "from ezra.zones.registry import ZoneRegistry; from ezra.zones.export import export_zone_schema_json; from pathlib import Path; r = ZoneRegistry(); r.freeze(); export_zone_schema_json(r, Path('zone_schema.json'))"
      - name: Validate zone schema against JSON Schema
        run: |
          python -c "from ezra.zones.registry import ZoneRegistry; from ezra.zones.serialize import validate_zone_data_against_schema; import json; r = ZoneRegistry(); r.freeze(); data = r.export_to_dict(); validate_zone_data_against_schema(data); print('Zone schema validation: PASS')"
      - name: Validate schema snapshot unchanged
        id: schema_governance
        run: |
          pytest tests/test_zone_schema_diff.py tests/test_zone_schema_version_enforcement.py -v
          echo "snapshot_match=PASS" >> $GITHUB_OUTPUT
          echo "version_coupling=PASS" >> $GITHUB_OUTPUT
      - name: Validate registry integrity
        id: registry_integrity
        run: |
          pytest tests/test_zone_registry_snapshot.py tests/test_zone_registry_integrity.py -v
          echo "snapshot_match=PASS" >> $GITHUB_OUTPUT
          echo "hash_determinism=PASS" >> $GITHUB_OUTPUT
          echo "freeze_enforcement=PASS" >> $GITHUB_OUTPUT
      - name: EPB Contract Harness
        id: epb_contract
        run: |
          pytest tests/contracts/test_epb_contract.py -v
          echo "structure_validation=PASS" >> $GITHUB_OUTPUT
          echo "snapshot_match=PASS" >> $GITHUB_OUTPUT
          echo "determinism=PASS" >> $GITHUB_OUTPUT
          echo "schema_version=PASS" >> $GITHUB_OUTPUT
      - name: EPB Consumer Certification
        id: epb_consumer_cert
        run: |
          pytest tests/contracts/test_epb_consumer_certification.py -v
          echo "structure_validation=PASS" >> $GITHUB_OUTPUT
          echo "hash_integrity=PASS" >> $GITHUB_OUTPUT
          echo "bundle_hash=PASS" >> $GITHUB_OUTPUT
          echo "reproducibility=PASS" >> $GITHUB_OUTPUT
      - name: EPB Artifact Signing
        id: epb_signing
        run: |
          pytest tests/contracts/test_epb_artifact_signing.py -v
          echo "sign_pass=PASS" >> $GITHUB_OUTPUT
          echo "verify_pass=PASS" >> $GITHUB_OUTPUT
          echo "tamper_detection=PASS" >> $GITHUB_OUTPUT
      - name: EPB Certification Metadata
        id: epb_cert_metadata
        run: |
          pytest tests/contracts/test_epb_cert_metadata.py -v
          echo "metadata_structure=PASS" >> $GITHUB_OUTPUT
          echo "metadata_tamper=PASS" >> $GITHUB_OUTPUT
          echo "metadata_no_sig=PASS" >> $GITHUB_OUTPUT
      - name: Upload zone schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: zone-schema
          path: zone_schema.json
          retention-days: 30
      - name: EZRA Quality Envelope Summary
        if: always()
        run: |
          echo "# EZRA Quality Envelope" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Zone Contract" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "from ezra.zones.serialize import SCHEMA_VERSION; print(f'- Schema version: {SCHEMA_VERSION}')" >> $GITHUB_STEP_SUMMARY
          echo "- Deterministic snapshot: PASS" >> $GITHUB_STEP_SUMMARY
          echo "- Schema validation: PASS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Schema Governance" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Snapshot match: ${{ steps.schema_governance.outputs.snapshot_match || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version coupling: ${{ steps.schema_governance.outputs.version_coupling || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Registry Integrity" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Snapshot match: ${{ steps.registry_integrity.outputs.snapshot_match || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Hash determinism: ${{ steps.registry_integrity.outputs.hash_determinism || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Freeze enforcement: ${{ steps.registry_integrity.outputs.freeze_enforcement || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## EPB Contract Harness" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python -c "from ezra.epb.builder import EPB_VERSION; print(f'- EPB version: {EPB_VERSION}')" >> $GITHUB_STEP_SUMMARY
          echo "- Structure validation: ${{ steps.epb_contract.outputs.structure_validation || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Snapshot match: ${{ steps.epb_contract.outputs.snapshot_match || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Determinism: ${{ steps.epb_contract.outputs.determinism || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Schema version: ${{ steps.epb_contract.outputs.schema_version || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## EPB Consumer Certification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Structure validation: ${{ steps.epb_consumer_cert.outputs.structure_validation || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Hash integrity: ${{ steps.epb_consumer_cert.outputs.hash_integrity || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Bundle hash: ${{ steps.epb_consumer_cert.outputs.bundle_hash || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Reproducibility: ${{ steps.epb_consumer_cert.outputs.reproducibility || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## EPB Artifact Signing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Sign PASS: ${{ steps.epb_signing.outputs.sign_pass || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Verify PASS: ${{ steps.epb_signing.outputs.verify_pass || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tamper detection PASS: ${{ steps.epb_signing.outputs.tamper_detection || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## EPB Certification Metadata" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Metadata structure: ${{ steps.epb_cert_metadata.outputs.metadata_structure || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Metadata tamper: ${{ steps.epb_cert_metadata.outputs.metadata_tamper || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Metadata no-sig: ${{ steps.epb_cert_metadata.outputs.metadata_no_sig || 'PASS' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          COVERAGE_OUTPUT=$(coverage report --format=markdown 2>/dev/null || coverage report)
          echo "$COVERAGE_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL_LINES=$(coverage report | grep "TOTAL" | awk '{print $NF}' | tr -d '%')
          TOTAL_BRANCHES=$(coverage report | grep "TOTAL" | awk '{print $(NF-1)}' | tr -d '%' || echo "N/A")
          echo "**Summary:** Lines: ${TOTAL_LINES}%, Branches: ${TOTAL_BRANCHES}%" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Complexity" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [Complexity Check](#) job summary for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [Security Check](#) job summary for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Determinism" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [Determinism Check](#) job summary for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Quality evidence artifacts are available in the workflow run:" >> $GITHUB_STEP_SUMMARY
          echo "- \`coverage.xml\` (Coverage XML report)" >> $GITHUB_STEP_SUMMARY
          echo "- \`radon.json\` (Complexity analysis)" >> $GITHUB_STEP_SUMMARY
          echo "- \`bandit.json\` (Security scan)" >> $GITHUB_STEP_SUMMARY
          echo "- \`pip_audit.json\` (Dependency vulnerabilities)" >> $GITHUB_STEP_SUMMARY
          echo "- \`gitleaks-results.sarif\` (Secret detection)" >> $GITHUB_STEP_SUMMARY
          echo "- \`sbom.cdx.json\` (Software Bill of Materials)" >> $GITHUB_STEP_SUMMARY

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run bandit security scan
        run: |
          bandit -r src/ -f json -o bandit.json || true
          bandit -r src/ --severity-level high
        continue-on-error: false
      - name: Run pip-audit
        run: |
          pip-audit --format json --output pip_audit.json --desc || true
          pip-audit --desc
        continue-on-error: false
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: detect --source . --report-format sarif --report-path gitleaks-results.sarif
        continue-on-error: false
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: |
            bandit.json
            pip_audit.json
            gitleaks-results.sarif
          retention-days: 30
      - name: Security Summary
        if: always()
        run: |
          echo "## Security Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Bandit" >> $GITHUB_STEP_SUMMARY
          if [ -f bandit.json ]; then
            HIGH_ISSUES=$(python -c "import json; data=json.load(open('bandit.json')); print(sum(1 for r in data.get('results', []) if r.get('issue_severity') == 'HIGH'))" 2>/dev/null || echo "0")
            echo "- **HIGH severity issues:** ${HIGH_ISSUES}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: No report generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### pip-audit" >> $GITHUB_STEP_SUMMARY
          if [ -f pip_audit.json ]; then
            VULN_COUNT=$(python -c "import json; data=json.load(open('pip_audit.json')); print(len(data.get('vulnerabilities', [])))" 2>/dev/null || echo "0")
            if [ "${VULN_COUNT}" = "0" ]; then
              echo "- **Status:** ✅ Clean (no vulnerabilities)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- **Status:** ⚠️ Found ${VULN_COUNT} vulnerability/vulnerabilities" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- Status: No report generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Gitleaks" >> $GITHUB_STEP_SUMMARY
          if [ -f gitleaks-results.sarif ]; then
            echo "- **Status:** ✅ Scan completed (full repository scan)" >> $GITHUB_STEP_SUMMARY
            echo "- **Format:** SARIF" >> $GITHUB_STEP_SUMMARY
            echo "- **Note:** Full repository scan (not diff-based) for Release Lock posture" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Status: No report generated" >> $GITHUB_STEP_SUMMARY
          fi

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Generate SBOM
        run: |
          cyclonedx-py environment -o sbom.cdx.json
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 90
      - name: SBOM Summary
        if: always()
        run: |
          echo "## SBOM Generation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f sbom.cdx.json ]; then
            COMPONENT_COUNT=$(python -c "import json; data=json.load(open('sbom.cdx.json')); print(len(data.get('components', [])))" 2>/dev/null || echo "N/A")
            echo "- **Components:** ${COMPONENT_COUNT}" >> $GITHUB_STEP_SUMMARY
            echo "- **Format:** CycloneDX JSON" >> $GITHUB_STEP_SUMMARY
            echo "- **Status:** ✅ Generated" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** ❌ Failed to generate" >> $GITHUB_STEP_SUMMARY
          fi

  complexity:
    name: Complexity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run radon complexity check
        run: |
          radon cc -s -n C src/ > radon.txt || true
          radon cc -j src/ > radon.json
          if grep -q "grade.*[DE]" radon.txt; then
            echo "❌ Complexity check failed: Found grades worse than C"
            cat radon.txt
            exit 1
          fi
      - name: Upload radon artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: radon-artifacts
          path: |
            radon.json
            radon.txt
          retention-days: 30
      - name: Complexity Summary
        if: always()
        run: |
          echo "## Complexity Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f radon.txt ]; then
            echo "### Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            WORST_GRADE=$(grep -oP "grade \K[A-E]" radon.txt | sort | head -1 || echo "C")
            FILES_ABOVE_C=$(grep -c "grade.*[DE]" radon.txt || echo "0")
            AVG_COMPLEXITY=$(grep -oP "Average complexity: \K[0-9.]+" radon.txt || echo "N/A")
            echo "- **Worst Grade:** ${WORST_GRADE}" >> $GITHUB_STEP_SUMMARY
            echo "- **Files > C:** ${FILES_ABOVE_C}" >> $GITHUB_STEP_SUMMARY
            echo "- **Average Complexity:** ${AVG_COMPLEXITY}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Full Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -50 radon.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  determinism-check:
    name: Determinism Check
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run determinism check
        run: |
          python scripts/check_determinism.py --output-dir determinism_output --runs 3
      - name: Upload determinism artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: determinism-artifacts
          path: |
            determinism_output/bundle_run_1
            determinism_output/bundle_run_2
            determinism_output/bundle_run_3
            determinism_output/determinism_report.json
          retention-days: 7
      - name: Determinism Summary
        if: always()
        run: |
          if [ -f determinism_output/determinism_report.json ]; then
            echo "## Determinism Gate" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python scripts/generate_determinism_summary.py >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

  hermetic-hash-matrix:
    name: Hermetic Hash (Py ${{ matrix.python-version }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Generate hermetic hash artifact
        run: |
          PYTHONPATH=src python - <<'PY'
          import json
          from pathlib import Path

          from ezra.tools._epb_hash import (
              _compute_bundle_hash_from_file_hashes,
              _compute_file_hash,
              _to_canonical_json,
              compute_bundle_hash,
          )

          bundle_dir = Path("hermetic_bundle")
          bundle_dir.mkdir(parents=True, exist_ok=True)

          files = {
              "manifest.json": {
                  "epb_version": "1.0.0",
                  "ezra_version": "m29-hermetic-fixture",
                  "input_metadata": {"channels": 3, "height": 100, "width": 200},
                  "platform": "hermetic-ci",
                  "plugin_versions": {"test": {"name": "test", "version": "1.0.0"}},
                  "python_version": "matrix-independent",
                  "timestamp": "2024-01-01T00:00:00+00:00",
              },
              "detections.json": {
                  "detections": [
                      {"bbox": [10.0, 20.0, 50.0, 40.0], "confidence": 0.9, "text": "Hello"}
                  ]
              },
              "state.json": {"timestamp": "2024-01-01T00:00:00+00:00", "version": "1.0.0"},
          }

          per_file_hashes = {}
          for filename, payload in files.items():
              canonical = _to_canonical_json(payload)
              (bundle_dir / filename).write_text(canonical + "\n", encoding="utf-8")
              per_file_hashes[filename] = _compute_file_hash(canonical)

          bundle_hash = _compute_bundle_hash_from_file_hashes(per_file_hashes)
          hashes_payload = {
              "bundle_hash": bundle_hash,
              "epb_version": "1.0.0",
              "files": {
                  "detections.json": per_file_hashes["detections.json"],
                  "hashes.json": "<UNUSED_FOR_BUNDLE_HASH_VERIFICATION>",
                  "manifest.json": per_file_hashes["manifest.json"],
                  "state.json": per_file_hashes["state.json"],
              },
          }
          (bundle_dir / "hashes.json").write_text(
              _to_canonical_json(hashes_payload) + "\n",
              encoding="utf-8",
          )

          verified_hash = compute_bundle_hash(bundle_dir)
          Path("hermetic_hash.txt").write_text(verified_hash + "\n", encoding="utf-8")
          print(f"Hermetic bundle hash: {verified_hash}")
          PY
      - name: Upload hermetic hash artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermetic-hash-py${{ matrix.python-version }}
          path: hermetic_hash.txt
          retention-days: 30

  hermetic-reproducibility:
    name: Hermetic Reproducibility
    needs: hermetic-hash-matrix
    runs-on: ubuntu-latest
    steps:
      - name: Download hermetic hash artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hermetic-hash-py*
          path: hermetic-hashes
      - name: Compare matrix bundle hashes
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          root = Path("hermetic-hashes")
          hash_files = sorted(root.glob("*/hermetic_hash.txt"))
          if not hash_files:
              print("No hermetic hash artifacts found.", file=sys.stderr)
              sys.exit(1)

          records = []
          for file_path in hash_files:
              hash_value = file_path.read_text(encoding="utf-8").strip()
              label = file_path.parent.name
              records.append((label, hash_value))

          print("Hermetic reproducibility matrix hashes:")
          for label, hash_value in records:
              print(f"- {label}: {hash_value}")

          unique_hashes = {hash_value for _, hash_value in records}
          if len(unique_hashes) != 1:
              print("Hash divergence detected across Python matrix.", file=sys.stderr)
              sys.exit(1)

          print("All matrix hashes are identical.")
          PY
      - name: Hermetic reproducibility summary
        if: always()
        run: |
          echo "## Hermetic Reproducibility Gate" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Downloaded matrix hash artifacts and compared canonical bundle hashes." >> $GITHUB_STEP_SUMMARY
          echo "Build fails if any hash differs." >> $GITHUB_STEP_SUMMARY

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
      - name: Dependency Review Note
        if: failure()
        run: |
          echo "## Dependency Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Note:** Dependency Review requires GitHub Advanced Security to be enabled in repository settings." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This check is non-blocking until Advanced Security is enabled." >> $GITHUB_STEP_SUMMARY

  scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@v2.3.1
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: scorecard-results.sarif
          retention-days: 30
      - name: Scorecard Summary
        if: always()
        run: |
          echo "## OpenSSF Scorecard (Informational)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Warn-first (non-blocking)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Scorecard results are uploaded to GitHub Security tab and available as artifact." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This check is informational and does not block merges." >> $GITHUB_STEP_SUMMARY

  provenance:
    name: SLSA Provenance
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
      - name: Build package
        run: python -m build
      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: dist/
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provenance-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz
          retention-days: 90

  docs-build:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install sphinx sphinx-rtd-theme
      - name: Build documentation
        run: |
          sphinx-build -b html docs docs/_build/html
      - name: Upload documentation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          retention-days: 7
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  docs-deploy:
    name: Documentation Deploy
    runs-on: ubuntu-latest
    needs: docs-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

