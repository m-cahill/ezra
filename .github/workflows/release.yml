name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build-release:
    name: Build Distribution Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install build

      - name: Build artifacts
        run: |
          python -m build

      - name: Generate artifact hashes
        run: |
          sha256sum dist/* > dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ezra-distribution
          path: dist/*

      - name: Generate SBOM
        run: |
          cyclonedx-py environment -o dist/sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ezra-sbom
          path: dist/sbom.json

      - name: Generate provenance attestation
        if: github.repository_visibility == 'public'
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018
        with:
          subject-path: dist/*

      - name: SLSA attestation unavailable (private repository)
        if: github.repository_visibility != 'public'
        run: |
          echo "## SLSA Provenance (Release)" >> $GITHUB_STEP_SUMMARY
          echo "Artifact attestation is skipped: GitHub does not persist attestations for this private repository class." >> $GITHUB_STEP_SUMMARY
          echo "Release still uploads \`ezra-distribution\`, SBOM, and \`provenance.json\` metadata; do not claim SLSA until attestation succeeds on a supported repo." >> $GITHUB_STEP_SUMMARY
          echo "::notice::Release SLSA attestation skipped for private repository."

      - name: Write provenance metadata
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 << 'EOF'
          import json, os
          hashes = {}
          with open("dist/SHA256SUMS.txt") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  parts = line.split(None, 1)
                  if len(parts) == 2:
                      hashes[parts[1]] = parts[0]
          with open("provenance.json", "w") as out:
              json.dump({
                  "commit": os.environ["GITHUB_SHA"],
                  "builder": "github-actions",
                  "workflow": os.environ["GITHUB_WORKFLOW"],
                  "run_id": int(os.environ["GITHUB_RUN_ID"]),
                  "artifact_hashes": hashes,
              }, out, sort_keys=True, indent=2)
          EOF

      - name: Upload provenance
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ezra-provenance
          path: provenance.json

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-release

    environment:
      name: pypi
      url: https://pypi.org/project/ezra/

    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ezra-distribution
          path: dist

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
